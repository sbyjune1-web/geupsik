<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>급식 출석 - 광주여자상업고등학교</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --pink-light: #fff0f5;
    --pink-mid:   #ffd6e7;
    --pink-main:  #ff85b3;
    --pink-deep:  #e8457a;
    --rose:       #c2185b;
    --text-dark:  #3d1a2e;
    --text-mid:   #7b3f5e;
    --white:      #ffffff;
    --breakfast:  #ff6b35;
    --dinner:     #5b6abf;
    --success:    #2d8653;
    --error:      #c0392b;
    --warn:       #d4820a;
    --card:       rgba(255,255,255,0.92);
    --radius:     20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, #fff0f5 0%, #ffffff 40%, #fce4ec 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 헤더 */
  header {
    background: linear-gradient(135deg, #fff0f5 0%, #fce4ec 100%);
    border-bottom: 2px solid var(--pink-mid);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 16px rgba(232,69,122,0.10);
  }
  .logo-img { height: 48px; object-fit: contain; }
  .header-center {
    text-align: center;
  }
  .school-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--rose);
    letter-spacing: 1px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-mid);
  }
  .header-clock {
    text-align: right;
  }
  .clock-time {
    font-size: 26px;
    font-weight: 700;
    color: var(--rose);
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .clock-date {
    font-size: 12px;
    color: var(--text-mid);
  }

  /* 식사 탭 */
  .meal-tabs {
    display: flex;
    margin: 14px 14px 0;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(232,69,122,0.12);
    border: 2px solid var(--pink-mid);
  }
  .meal-tab {
    flex: 1;
    padding: 14px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    background: #fff8fb;
    color: #c4a0b0;
  }
  .meal-tab.active[data-meal="조식"] {
    background: linear-gradient(135deg, #fff3e0, #ffccbc);
    color: var(--breakfast);
    box-shadow: inset 0 -3px 0 var(--breakfast);
  }
  .meal-tab.active[data-meal="석식"] {
    background: linear-gradient(135deg, #e8eaf6, #c5cae9);
    color: var(--dinner);
    box-shadow: inset 0 -3px 0 var(--dinner);
  }

  /* 메인 그리드 */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 14px;
    flex: 1;
  }

  /* QR 섹션 */
  .qr-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(232,69,122,0.10);
    border: 1.5px solid var(--pink-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .qr-wrapper { margin-bottom: 8px; }
  .qr-wrapper canvas, .qr-wrapper img { border-radius: 10px; border: 3px solid var(--pink-mid); }
  .qr-desc { font-size: 12px; color: #bbb; }

  /* 입력 섹션 */
  .input-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: 0 4px 20px rgba(232,69,122,0.10);
    border: 1.5px solid var(--pink-mid);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  #studentIdInput {
    width: 100%;
    padding: 14px;
    font-size: 26px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: 2.5px solid var(--pink-mid);
    border-radius: 14px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    margin-bottom: 10px;
    background: #fff8fb;
    color: var(--text-dark);
    transition: border 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  #studentIdInput:focus {
    border-color: var(--pink-deep);
    box-shadow: 0 0 0 3px rgba(232,69,122,0.15);
  }
  #studentIdInput::-webkit-inner-spin-button,
  #studentIdInput::-webkit-outer-spin-button { -webkit-appearance: none; }
  #submitBtn {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--pink-deep) 0%, var(--rose) 100%);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(194,24,91,0.25);
    letter-spacing: 1px;
  }
  #submitBtn:active { transform: scale(0.97); opacity: 0.9; }

  /* 카운터 */
  .counter-row {
    display: flex;
    gap: 14px;
    margin: 0 14px;
  }
  .counter-card {
    flex: 1;
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 16px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(232,69,122,0.08);
    border: 1.5px solid var(--pink-mid);
  }
  .counter-label { font-size: 12px; color: var(--text-mid); font-weight: 600; }
  .counter-num   { font-size: 34px; font-weight: 900; margin-top: 2px; }
  .counter-card.breakfast .counter-num { color: var(--breakfast); }
  .counter-card.dinner    .counter-num { color: var(--dinner); }

  /* 최근 출석 */
  .recent-card {
    margin: 14px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: 0 4px 20px rgba(232,69,122,0.08);
    border: 1.5px solid var(--pink-mid);
    flex: 1;
    overflow: hidden;
  }
  .recent-list { max-height: 160px; overflow-y: auto; }
  .recent-item {
    display: flex;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #fce4ec;
    font-size: 14px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .recent-item:last-child { border-bottom: none; }
  .recent-time  { color: #cba; font-size: 11px; width: 52px; flex-shrink: 0; }
  .recent-name  { font-weight: 700; flex: 1; color: var(--text-dark); }
  .recent-grade { color: var(--text-mid); font-size: 11px; margin-right: 6px; }
  .badge {
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-breakfast { background: #fff3e0; color: var(--breakfast); }
  .badge-dinner    { background: #e8eaf6; color: var(--dinner); }

  /* 팝업 오버레이 */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,26,46,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .popup-overlay.show { display: flex; }

  .popup {
    background: #fff;
    border-radius: 28px;
    padding: 36px 32px 28px;
    width: 420px;
    max-width: 90%;
    text-align: center;
    animation: popUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 24px 64px rgba(0,0,0,0.22);
  }
  @keyframes popUp {
    from { opacity:0; transform: scale(0.7) translateY(30px); }
    to   { opacity:1; transform: scale(1)   translateY(0); }
  }
  .popup.success { border-top: 8px solid var(--success); }
  .popup.error   { border-top: 8px solid var(--error); }
  .popup.warn    { border-top: 8px solid var(--warn); }

  .popup-icon { font-size: 72px; line-height: 1; margin-bottom: 10px; }
  .popup-name { font-size: 36px; font-weight: 900; margin: 8px 0 6px; }
  .popup.success .popup-name { color: var(--success); }
  .popup.error   .popup-name { color: var(--error); }
  .popup.warn    .popup-name { color: var(--warn); }
  .popup-sub  { font-size: 16px; color: #666; line-height: 1.7; margin-bottom: 22px; }

  .popup-close {
    width: 100%;
    padding: 15px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
  }
  .popup.success .popup-close { background: #e8f5e9; color: var(--success); }
  .popup.error   .popup-close { background: #ffebee; color: var(--error); }
  .popup.warn    .popup-close { background: #fff8e1; color: var(--warn); }

  /* 설정 버튼 */
  .settings-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--rose);
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(194,24,91,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .settings-btn:hover { opacity: 1; }

  /* 설정 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
    border-top: 5px solid var(--rose);
  }
  .modal h3 { font-size: 17px; font-weight: 900; color: var(--text-dark); margin-bottom: 14px; }
  .modal input {
    width: 100%;
    padding: 11px;
    border: 2px solid var(--pink-mid);
    border-radius: 10px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    margin-bottom: 10px;
    color: var(--text-dark);
    outline: none;
  }
  .modal input:focus { border-color: var(--pink-deep); }
  .modal-desc { font-size: 11px; color: var(--text-mid); margin-bottom: 6px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; margin-top: 4px; }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }
  .modal-btn.primary   { background: linear-gradient(135deg, var(--pink-deep), var(--rose)); color: #fff; }
  .modal-btn.secondary { background: #f0f0f0; color: #666; }

  /* 하트 장식 */
  .deco {
    position: fixed;
    font-size: 22px;
    opacity: 0.08;
    pointer-events: none;
    animation: float 7s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-10deg); }
    50%      { transform: translateY(-20px) rotate(10deg); }
  }
</style>
</head>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const DEFAULT_API_URL    = 'https://script.google.com/macros/s/AKfycbwa0kjUAUKG4qAnu-3MA-L1vSZHXekgfXdEiYBfNE-c0loNi6eJ7Qf8ns_p1Cp7QGU_5A/exec';
const DEFAULT_MOBILE_BASE = 'https://sbyjune1-web.github.io/geupsik/geupsik_mobile.html';

let API_URL    = localStorage.getItem('apiUrl')    || DEFAULT_API_URL;
let MOBILE_URL = localStorage.getItem('mobileUrl') || DEFAULT_MOBILE_BASE;
let currentMeal = '조식';
const recentItems = [];
let popupTimer = null;

// 시계
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour12: false });
  document.getElementById('dateStr').textContent = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
updateClock();
setInterval(updateClock, 1000);

// 식사 선택
function selectMeal(meal) {
  currentMeal = meal;
  document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.meal-tab[data-meal="${meal}"]`).classList.add('active');
  updateQR();
  loadStatus();
}

// QR 생성
function updateQR() {
  const el = document.getElementById('qrcode');
  el.innerHTML = '';
  const url = `${DEFAULT_MOBILE_BASE}?meal=${encodeURIComponent(currentMeal)}&api=${encodeURIComponent(API_URL)}`;
  new QRCode(el, { text: url, width: 150, height: 150, colorDark: '#3d1a2e', colorLight: '#fff8fb', correctLevel: QRCode.CorrectLevel.M });
}

// 출석 등록
async function submitAttendance(method) {
  const input = document.getElementById('studentIdInput');
  const studentId = input.value.trim();
  if (!studentId) { showPopup('error','❌','학번 미입력','학번을 입력해주세요'); return; }
  if (!API_URL)   { showPopup('error','⚙️','설정 필요','설정 버튼을 눌러 API URL을 입력하세요'); return; }

  try {
    const res  = await fetch(API_URL, { method:'POST', body: JSON.stringify({ studentId, meal: currentMeal, method }) });
    const data = await res.json();
    if (data.success) {
      const s = data.student;
      showPopup('success','✅', s.name + ' 학생', s.grade + '학년 ' + s.classNum + '반 ' + s.number + '번\n' + currentMeal + ' 출석이 완료되었습니다 🎉');
      addRecent(s, currentMeal, method);
      updateCounter(currentMeal);
    } else if (data.duplicate) {
      const s = data.student;
      showPopup('warn','⚠️', s.name + ' 학생', '이미 ' + currentMeal + ' 출석이 등록되어 있습니다');
    } else {
      showPopup('error','❌','등록 실패', data.message || '오류가 발생했습니다');
    }
  } catch(e) {
    showPopup('error','🔌','연결 오류','API URL을 확인하세요');
  }
  input.value = '';
  input.focus();
}

// 팝업
function showPopup(type, icon, name, sub) {
  const overlay = document.getElementById('popupOverlay');
  const popup   = document.getElementById('popup');
  popup.className = 'popup ' + type;
  document.getElementById('pIcon').textContent = icon;
  document.getElementById('pName').textContent = name;
  document.getElementById('pSub').textContent  = sub;
  overlay.classList.add('show');
  if (popupTimer) clearTimeout(popupTimer);
  if (type === 'success') popupTimer = setTimeout(closePopup, 3000);
}
function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  document.getElementById('studentIdInput').focus();
}

// 최근 목록
function addRecent(student, meal, method) {
  const time = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12:false });
  recentItems.unshift({ student, meal, method, time });
  if (recentItems.length > 30) recentItems.pop();
  renderRecent();
}
function renderRecent() {
  const list = document.getElementById('recentList');
  if (!recentItems.length) { list.innerHTML = '<div style="color:#ccc;font-size:13px;text-align:center;padding:16px;">아직 출석 기록이 없습니다</div>'; return; }
  list.innerHTML = recentItems.map(({ student:s, meal, time }) =>
    `<div class="recent-item">
      <span class="recent-time">${time}</span>
      <span class="recent-name">${s.name}</span>
      <span class="recent-grade">${s.grade}학년 ${s.classNum}반</span>
      <span class="badge ${meal==='조식'?'badge-breakfast':'badge-dinner'}">${meal}</span>
    </div>`
  ).join('');
}

// 카운터
function updateCounter(meal) {
  const id = meal==='조식' ? 'breakfastCount' : 'dinnerCount';
  const el = document.getElementById(id);
  el.textContent = (parseInt(el.textContent) || 0) + 1;
}
async function loadStatus() {
  if (!API_URL) return;
  try {
    const [r1,r2] = await Promise.all([
      fetch(`${API_URL}?action=status&meal=조식`).then(r=>r.json()),
      fetch(`${API_URL}?action=status&meal=석식`).then(r=>r.json())
    ]);
    if (r1.success) document.getElementById('breakfastCount').textContent = r1.count;
    if (r2.success) document.getElementById('dinnerCount').textContent    = r2.count;
  } catch(e) {}
}

// 설정
function openSettings() {
  document.getElementById('apiUrlInput').value    = API_URL;
  document.getElementById('mobileUrlInput').value = MOBILE_URL;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeSettings() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveSettings() {
  API_URL    = document.getElementById('apiUrlInput').value.trim();
  MOBILE_URL = document.getElementById('mobileUrlInput').value.trim();
  localStorage.setItem('apiUrl',    API_URL);
  localStorage.setItem('mobileUrl', MOBILE_URL);
  closeSettings();
  updateQR();
  loadStatus();
}

// 초기화
updateQR();
loadStatus();
setInterval(loadStatus, 60000);
document.getElementById('studentIdInput').focus();
</script>
</body>
</html>
