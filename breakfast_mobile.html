<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>조식 출석 - 광주여자상업고등학교</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
  :root {
    --orange: #ff6b35;
    --orange-deep: #e64a19;
    --bg1: #fff8f0;
    --bg2: #fff3e0;
    --text-dark: #2d1a0e;
    --text-mid: #7a4030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, #fff 50%, var(--bg2) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 32px 0;
  }

  /* 헤더 */
  .header {
    width: 100%;
    background: rgba(255,255,255,0.93);
    border-bottom: 2px solid #ffd6a0;
    padding: 14px 20px 10px;
    text-align: center;
    box-shadow: 0 2px 16px rgba(255,107,53,0.10);
  }
  .logo-img { height: 46px; object-fit: contain; margin-bottom: 6px; }
  .clock-time {
    font-size: 28px; font-weight: 900;
    color: var(--orange); letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .clock-date { font-size: 12px; color: var(--text-mid); margin-top: 2px; }

  /* 카드 */
  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 28px;
    padding: 28px 22px 24px;
    width: calc(100% - 28px);
    max-width: 400px;
    margin-top: 22px;
    box-shadow: 0 8px 36px rgba(255,107,53,0.13);
    border: 1.5px solid #ffd6a0;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .meal-title {
    font-size: 22px; font-weight: 900;
    color: var(--orange-deep); letter-spacing: 1px;
  }

  input[type=number] {
    width: 100%;
    padding: 22px 16px;
    font-size: 48px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    border: 3px solid #ffd6a0;
    border-radius: 20px;
    text-align: center;
    letter-spacing: 8px;
    outline: none;
    background: var(--bg1);
    color: var(--text-dark);
    transition: border 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number]:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 4px rgba(255,107,53,0.15);
    background: #fff;
  }
  input[type=number]::placeholder { color: #ddb; font-size: 28px; letter-spacing: 4px; }

  button.submit {
    width: 100%;
    padding: 20px;
    font-size: 22px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 100%);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 24px rgba(230,74,25,0.28);
    letter-spacing: 2px;
  }
  button.submit:active { transform: scale(0.97); opacity: 0.9; }

  /* 팝업 */
  .popup-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(45,26,14,0.6); z-index: 100;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .popup-overlay.show { display: flex; }

  .popup {
    background: #fff; border-radius: 30px;
    padding: 40px 28px 28px;
    width: 88%; max-width: 360px;
    text-align: center;
    animation: popUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.22);
  }
  @keyframes popUp {
    from { opacity:0; transform: scale(0.6) translateY(40px); }
    to   { opacity:1; transform: scale(1)   translateY(0); }
  }
  .popup.success { border-top: 10px solid #2d8653; }
  .popup.error   { border-top: 10px solid #c0392b; }
  .popup.warn    { border-top: 10px solid #d4820a; }

  .popup-icon { font-size: 72px; line-height: 1; margin-bottom: 10px; }
  .popup-name { font-size: 34px; font-weight: 900; margin: 8px 0 6px; }
  .popup.success .popup-name { color: #2d8653; }
  .popup.error   .popup-name { color: #c0392b; }
  .popup.warn    .popup-name { color: #d4820a; }
  .popup-sub  { font-size: 16px; color: #666; line-height: 1.7; margin-bottom: 22px; white-space: pre-line; }

  .popup-close {
    width: 100%; padding: 16px; font-size: 17px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; border-radius: 14px; cursor: pointer;
  }
  .popup.success .popup-close { background: #e8f5e9; color: #2d8653; }
  .popup.error   .popup-close { background: #ffebee; color: #c0392b; }
  .popup.warn    .popup-close { background: #fff8e1; color: #d4820a; }

  .deco { position: fixed; font-size: 22px; opacity: 0.07; pointer-events: none; animation: float 7s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)rotate(-8deg);}50%{transform:translateY(-18px)rotate(8deg);} }
</style>
</head>

  <div class="clock-time" id="clock">--:--:--</div>
  <div class="clock-date"  id="dateStr"></div>
</div>

<!-- 카드 -->
<div class="card">
  <div class="meal-title">🌅 조식 출석 체크</div>
  <input type="number" id="sid" placeholder="학번 입력"
         inputmode="numeric" autofocus
         onkeydown="if(event.key==='Enter') doSubmit()">
  <button class="submit" onclick="doSubmit()">출석 확인 ✓</button>
</div>

<!-- 팝업 -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup" id="popup">
    <div class="popup-icon" id="pIcon"></div>
    <div class="popup-name" id="pName"></div>
    <div class="popup-sub"  id="pSub"></div>
    <button class="popup-close" onclick="closePopup()">확인</button>
  </div>
</div>

<script>
// ── 음성 안내 (Web Speech API) ──────────────────────────
let voices = [];
function loadVoices() {
  voices = speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
  speechSynthesis.cancel(); // 이전 음성 중단
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR';
  utter.rate = 0.95;
  utter.pitch = 1.1;

  // 한국어 여성 목소리 우선 선택
  const femaleVoice = voices.find(v =>
    v.lang.startsWith('ko') && /female|woman|미|나|여|유나|지수|선희/i.test(v.name)
  ) || voices.find(v => v.lang.startsWith('ko'));

  if (femaleVoice) utter.voice = femaleVoice;
  speechSynthesis.speak(utter);
}

const DEFAULT_API = 'https://script.google.com/macros/s/AKfycbwa0kjUAUKG4qAnu-3MA-L1vSZHXekgfXdEiYBfNE-c0loNi6eJ7Qf8ns_p1Cp7QGU_5A/exec';
const params = new URLSearchParams(window.location.search);
const apiUrl = params.get('api') || DEFAULT_API;
let popupTimer = null;

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour12: false });
  document.getElementById('dateStr').textContent = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
updateClock(); setInterval(updateClock, 1000);

async function doSubmit() {
  const sid = document.getElementById('sid').value.trim();
  if (!sid) { showPopup('error','❌','학번 미입력','학번을 입력해주세요'); return; }

  try {
    const res  = await fetch(apiUrl, { method:'POST', body: JSON.stringify({ studentId: sid, meal:'조식', method:'QR스캔' }) });
    const data = await res.json();
    if (data.success) {
      const s = data.student;
      showPopup('success','✅', s.name + ' 학생', s.grade + '학년 ' + s.classNum + '반 ' + s.number + '번\n조식 출석 완료 🎉');
      speak(s.name + ' 학생, 조식 출석 확인되었습니다');
      document.getElementById('sid').value = '';
    } else if (data.duplicate) {
      const s = data.student;
      showPopup('warn','⚠️', s.name + ' 학생', '이미 조식 출석이 등록되어 있습니다');
      speak('이미 출석이 등록되어 있습니다');
    } else {
      showPopup('error','❌','등록 실패', data.message || '학번을 다시 확인해주세요');
      speak('등록되지 않은 학번입니다');
    }
  } catch(e) {
    showPopup('error','🔌','연결 오류','잠시 후 다시 시도해주세요');
  }
}

function showPopup(type, icon, name, sub) {
  const popup = document.getElementById('popup');
  popup.className = 'popup ' + type;
  document.getElementById('pIcon').textContent = icon;
  document.getElementById('pName').textContent = name;
  document.getElementById('pSub').textContent  = sub;
  document.getElementById('popupOverlay').classList.add('show');
  if (popupTimer) clearTimeout(popupTimer);
  if (type === 'success') popupTimer = setTimeout(closePopup, 2500);
}
function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  document.getElementById('sid').focus();
}
</script>
</body>
</html>
