<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>공채반 출석 - 광주여자상업고등학교</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
  :root {
    --blue: #1565C0;
    --blue-deep: #0d47a1;
    --bg1: #f0f4ff;
    --bg2: #e8eaf6;
    --text-dark: #1a1a2e;
    --text-mid: #4a4a7a;
    --success: #2d8653;
    --error: #c0392b;
    --warn: #d4820a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, #fff 50%, var(--bg2) 100%);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px;
  }
  .container { width: 100%; max-width: 560px; display: flex; flex-direction: column; align-items: center; gap: 20px; }

  .header {
    width: 100%; background: rgba(255,255,255,0.92);
    border-radius: 24px; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(21,101,192,0.12);
    border: 1.5px solid #bbdefb;
  }
  .logo-img { height: 46px; object-fit: contain; }
  .clock-wrap { text-align: right; }
  .clock-time { font-size: 30px; font-weight: 900; color: var(--blue); letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1; }
  .clock-date { font-size: 13px; color: var(--text-mid); margin-top: 3px; }

  .meal-title { font-size: 26px; font-weight: 900; color: var(--blue-deep); letter-spacing: 2px; text-shadow: 0 2px 8px rgba(21,101,192,0.15); }

  .input-card {
    width: 100%; background: rgba(255,255,255,0.95);
    border-radius: 28px; padding: 32px 28px;
    box-shadow: 0 8px 40px rgba(21,101,192,0.15);
    border: 2px solid #bbdefb;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  #studentIdInput {
    width: 100%; padding: 24px 20px;
    font-size: 52px; font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    border: 3px solid #bbdefb; border-radius: 20px;
    text-align: center; letter-spacing: 10px; outline: none;
    background: var(--bg1); color: var(--text-dark);
    transition: border 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  #studentIdInput::-webkit-inner-spin-button,
  #studentIdInput::-webkit-outer-spin-button { -webkit-appearance: none; }
  #studentIdInput:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(21,101,192,0.15); background: #fff; }
  #studentIdInput::placeholder { color: #c5cae9; letter-spacing: 4px; font-size: 32px; }

  #submitBtn {
    width: 100%; padding: 22px; font-size: 24px; font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; border-radius: 20px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
    color: #fff; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 6px 24px rgba(13,71,161,0.3); letter-spacing: 2px;
  }
  #submitBtn:active { transform: scale(0.97); opacity: 0.9; }

  /* 최근 출석 */
  .recent-wrap {
    position: fixed; bottom: 16px; left: 16px;
    background: rgba(255,255,255,0.93);
    border: 1.5px solid #bbdefb; border-radius: 16px;
    padding: 12px 14px; min-width: 200px; max-width: 240px;
    box-shadow: 0 4px 16px rgba(21,101,192,0.12);
    display: none;
  }
  .recent-title { font-size: 11px; font-weight: 700; color: var(--text-mid); letter-spacing: 1px; margin-bottom: 8px; }
  .recent-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0; border-bottom: 1px solid #e3f2fd; font-size: 12px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);} }
  .recent-item:last-child { border-bottom: none; }
  .recent-num  { color: #bbb; font-size: 10px; width: 36px; }
  .recent-name { font-weight: 700; color: var(--text-dark); flex: 1; }
  .recent-grade{ color: var(--text-mid); font-size: 10px; }

  /* 팝업 */
  .popup-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,26,46,0.6); z-index: 100;
    align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .popup-overlay.show { display: flex; }
  .popup {
    background: #fff; border-radius: 32px; padding: 44px 36px 32px;
    width: 460px; max-width: 92%; text-align: center;
    animation: popUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 24px 80px rgba(0,0,0,0.22);
  }
  @keyframes popUp { from{opacity:0;transform:scale(0.6)translateY(40px);}to{opacity:1;transform:scale(1)translateY(0);} }
  .popup.success { border-top: 10px solid var(--success); }
  .popup.error   { border-top: 10px solid var(--error); }
  .popup.warn    { border-top: 10px solid var(--warn); }
  .popup-icon { font-size: 80px; line-height: 1; margin-bottom: 12px; }
  .popup-name { font-size: 40px; font-weight: 900; margin: 8px 0; }
  .popup.success .popup-name { color: var(--success); }
  .popup.error   .popup-name { color: var(--error); }
  .popup.warn    .popup-name { color: var(--warn); }
  .popup-sub { font-size: 18px; color: #666; line-height: 1.7; margin-bottom: 24px; white-space: pre-line; }
  .popup-close {
    width: 100%; padding: 17px; font-size: 18px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; border: none; border-radius: 16px; cursor: pointer;
  }
  .popup.success .popup-close { background: #e8f5e9; color: var(--success); }
  .popup.error   .popup-close { background: #ffebee; color: var(--error); }
  .popup.warn    .popup-close { background: #fff8e1; color: var(--warn); }

  .settings-btn {
    position: fixed; bottom: 14px; right: 14px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(21,101,192,0.15); color: var(--blue-deep);
    border: none; font-size: 16px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s;
  }
  .settings-btn:hover { opacity: 1; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 24px; width: 90%; max-width: 400px; border-top: 5px solid var(--blue); }
  .modal h3 { font-size: 16px; font-weight: 900; color: var(--text-dark); margin-bottom: 12px; }
  .modal input { width: 100%; padding: 10px; border: 2px solid #bbdefb; border-radius: 10px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; margin-bottom: 10px; outline: none; }
  .modal-desc { font-size: 11px; color: var(--text-mid); margin-bottom: 6px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .modal-btn.primary { background: linear-gradient(135deg, var(--blue), var(--blue-deep)); color: #fff; }
  .modal-btn.secondary { background: #f0f0f0; color: #666; }

  .deco { position: fixed; font-size: 24px; opacity: 0.07; pointer-events: none; animation: float 7s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)rotate(-8deg);}50%{transform:translateY(-20px)rotate(8deg);} }
</style>
</head>

    <div class="clock-wrap">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date"  id="dateStr"></div>
    </div>
  </div>
  <div class="meal-title">💼 공채반 출석 체크</div>
  <div class="input-card">
    <input type="number" id="studentIdInput" placeholder="학번 입력"
           inputmode="numeric" autofocus
           onkeydown="if(event.key==='Enter') submitAttendance()">
    <button id="submitBtn" onclick="submitAttendance()">출석 확인 ✓</button>
  </div>
</div>

<div class="recent-wrap" id="recentWrap">
  <div class="recent-title">📋 최근 출석 (10명)</div>
  <div id="recentList"></div>
</div>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup" id="popup">
    <div class="popup-icon" id="pIcon"></div>
    <div class="popup-name" id="pName"></div>
    <div class="popup-sub"  id="pSub"></div>
    <button class="popup-close" onclick="closePopup()">확인</button>
  </div>
</div>

<button class="settings-btn" onclick="openSettings()">⚙️</button>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>⚙️ API 설정</h3>
    <div class="modal-desc">Apps Script 웹앱 URL</div>
    <input type="url" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeSettings()">취소</button>
      <button class="modal-btn primary"   onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_API = 'YOUR_APPS_SCRIPT_URL_HERE';
let API_URL = localStorage.getItem('jbApiUrl') || DEFAULT_API;
const recentItems = [];
let popupTimer = null;

// 음성
let voices = [];
speechSynthesis.onvoiceschanged = () => { voices = speechSynthesis.getVoices(); };
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.95; u.pitch = 1.1;
  const v = voices.find(v => v.lang.startsWith('ko') && /female|woman|미|나|여|유나|지수/i.test(v.name))
            || voices.find(v => v.lang.startsWith('ko'));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour12: false });
  document.getElementById('dateStr').textContent = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
updateClock(); setInterval(updateClock, 1000);

async function submitAttendance() {
  const input = document.getElementById('studentIdInput');
  const btn   = document.getElementById('submitBtn');
  const studentId = input.value.trim();
  if (!studentId) { showPopup('error','❌','학번 미입력','학번을 입력해주세요'); return; }

  btn.disabled = true; btn.textContent = '확인 중... ⏳'; btn.style.opacity = '0.6';
  input.disabled = true;

  try {
    const res  = await fetch(API_URL, { method:'POST', body: JSON.stringify({ studentId, className:'공채반', method:'학번입력' }) });
    const data = await res.json();
    if (data.success) {
      const s = data.student;
      const cls = String(s.classNum).replace('반','');
      showPopup('success','✅', s.name + ' 학생', s.grade + '학년 ' + cls + '반 ' + s.number + '번\n공채반 출석 완료 🎉');
      speak(s.name + ' 학생, 공채반 출석 확인되었습니다');
      addRecent(s);
    } else if (data.duplicate) {
      const s = data.student;
      const cls = String(s.classNum).replace('반','');
      showPopup('warn','⚠️', s.name + ' 학생', s.grade + '학년 ' + cls + '반 ' + s.number + '번\n이미 공채반 출석이 등록되어 있습니다');
      speak('이미 출석이 등록되어 있습니다');
    } else {
      showPopup('error','❌','등록 실패', data.message || '학번을 다시 확인해주세요');
      speak('등록되지 않은 학번입니다');
    }
  } catch(e) {
    showPopup('error','🔌','연결 오류','잠시 후 다시 시도해주세요');
  } finally {
    btn.disabled = false; btn.textContent = '출석 확인 ✓'; btn.style.opacity = '1';
    input.disabled = false; input.value = '';
  }
}

function showPopup(type, icon, name, sub) {
  const popup = document.getElementById('popup');
  popup.className = 'popup ' + type;
  document.getElementById('pIcon').textContent = icon;
  document.getElementById('pName').textContent = name;
  document.getElementById('pSub').textContent  = sub;
  document.getElementById('popupOverlay').classList.add('show');
  if (popupTimer) clearTimeout(popupTimer);
  if (type === 'success') popupTimer = setTimeout(closePopup, 3000);
}
function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  document.getElementById('studentIdInput').focus();
}

function addRecent(s) {
  const cls = String(s.classNum).replace('반','');
  recentItems.unshift({ name:s.name, grade:s.grade, cls, number:s.number, id:s.studentId });
  if (recentItems.length > 10) recentItems.pop();
  const wrap = document.getElementById('recentWrap');
  const list = document.getElementById('recentList');
  wrap.style.display = 'block';
  list.innerHTML = recentItems.map(r =>
    '<div class="recent-item">' +
    '<span class="recent-num">' + r.id + '</span>' +
    '<span class="recent-name">' + r.name + '</span>' +
    '<span class="recent-grade">' + r.grade + '학년 ' + r.cls + '반</span>' +
    '</div>'
  ).join('');
}

function openSettings() { document.getElementById('apiUrlInput').value = API_URL; document.getElementById('modalOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveSettings() { API_URL = document.getElementById('apiUrlInput').value.trim(); localStorage.setItem('jbApiUrl', API_URL); closeSettings(); }
</script>
</body>
</html>
