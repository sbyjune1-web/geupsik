<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>취업부 출석 - 광주여자상업고등학교</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
  :root {
    --공채: #1565C0; --공채-deep: #0d47a1; --공채-light: #e3f2fd;
    --공무원: #6a1b9a; --공무원-deep: #4a148c; --공무원-light: #f3e5f5;
    --bg1: #f0f4ff; --bg2: #f5e6ff;
    --text-dark: #1a1a2e; --text-mid: #4a4a7a;
    --success: #2d8653; --error: #c0392b; --warn: #d4820a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, #fff 50%, var(--bg2) 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px;
  }
  .container { width: 100%; max-width: 680px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .header {
    width: 100%; background: rgba(255,255,255,0.93);
    border-radius: 24px; padding: 12px 22px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(26,26,46,0.10); border: 1.5px solid #c5cae9;
  }
  .logo-img { height: 44px; object-fit: contain; }
  .header-center { text-align: center; }
  .school-name { font-size: 13px; font-weight: 900; color: var(--공무원); letter-spacing: 1px; }
  .system-name  { font-size: 11px; color: var(--text-mid); }
  .clock-wrap { text-align: right; }
  .clock-time { font-size: 26px; font-weight: 900; color: var(--공채); letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1; }
  .clock-date { font-size: 11px; color: var(--text-mid); margin-top: 2px; }

  /* 반 선택 탭 */
  .class-tabs {
    width: 100%; display: flex; border-radius: 18px; overflow: hidden;
    box-shadow: 0 4px 16px rgba(26,26,46,0.12); border: 2px solid #c5cae9;
  }
  .class-tab {
    flex: 1; padding: 14px; font-size: 19px; font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; cursor: pointer; transition: all 0.25s;
    background: #f5f5f5; color: #aaa; letter-spacing: 1px;
  }
  .class-tab.active[data-cls="공채반"]  { background: linear-gradient(135deg,#e3f2fd,#bbdefb); color: var(--공채);   box-shadow: inset 0 -4px 0 var(--공채); }
  .class-tab.active[data-cls="공무원반"] { background: linear-gradient(135deg,#f3e5f5,#e1bee7); color: var(--공무원); box-shadow: inset 0 -4px 0 var(--공무원); }

  /* 메인 그리드 */
  .main-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .card {
    background: rgba(255,255,255,0.95); border-radius: 20px; padding: 18px;
    box-shadow: 0 4px 20px rgba(26,26,46,0.10); border: 1.5px solid #c5cae9;
  }
  .section-label { font-size: 11px; font-weight: 700; color: var(--text-mid); letter-spacing: 1.5px; margin-bottom: 12px; }

  /* QR 섹션 */
  .qr-card { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .qr-wrapper canvas, .qr-wrapper img { border-radius: 10px; border: 3px solid #e8eaf6; }
  .qr-token { font-size: 10px; color: #bbb; margin-top: 8px; font-family: monospace; }
  .qr-class-label { font-size: 13px; font-weight: 700; margin-top: 6px; }
  .qr-class-label.gc { color: var(--공채); }
  .qr-class-label.gm { color: var(--공무원); }

  /* 입력 섹션 */
  .input-card { display: flex; flex-direction: column; justify-content: center; }
  #studentIdInput {
    width: 100%; padding: 16px; font-size: 36px; font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    border: 3px solid #c5cae9; border-radius: 16px;
    text-align: center; letter-spacing: 8px; outline: none;
    background: var(--bg1); color: var(--text-dark);
    transition: border 0.2s, box-shadow 0.2s; -moz-appearance: textfield;
    margin-bottom: 10px;
  }
  #studentIdInput::-webkit-inner-spin-button, #studentIdInput::-webkit-outer-spin-button { -webkit-appearance: none; }
  #studentIdInput:focus { border-color: var(--공채); box-shadow: 0 0 0 3px rgba(21,101,192,0.15); background: #fff; }
  #studentIdInput.gm:focus { border-color: var(--공무원); box-shadow: 0 0 0 3px rgba(106,27,154,0.15); }

  #submitBtn {
    width: 100%; padding: 15px; font-size: 18px; font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--공채) 0%, var(--공채-deep) 100%);
    color: #fff; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(13,71,161,0.28); letter-spacing: 1px;
  }
  #submitBtn.gm { background: linear-gradient(135deg, var(--공무원) 0%, var(--공무원-deep) 100%); box-shadow: 0 4px 16px rgba(106,27,154,0.28); }
  #submitBtn:active { transform: scale(0.97); opacity: 0.9; }

  /* 카운터 */
  .counter-row { width: 100%; display: flex; gap: 14px; }
  .counter-card { flex: 1; background: rgba(255,255,255,0.95); border-radius: 16px; padding: 12px; text-align: center; box-shadow: 0 4px 14px rgba(26,26,46,0.08); border: 1.5px solid #c5cae9; }
  .counter-label { font-size: 11px; font-weight: 700; color: var(--text-mid); }
  .counter-num   { font-size: 28px; font-weight: 900; margin-top: 4px; }
  .counter-card.gc .counter-num { color: var(--공채); }
  .counter-card.gm .counter-num { color: var(--공무원); }

  /* 최근 출석 */
  .recent-card { width: 100%; background: rgba(255,255,255,0.95); border-radius: 16px; padding: 12px 16px; box-shadow: 0 4px 14px rgba(26,26,46,0.08); border: 1.5px solid #c5cae9; }
  .recent-list  { max-height: 110px; overflow-y: auto; }
  .recent-item  { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid #e8eaf6; font-size: 13px; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);} }
  .recent-item:last-child { border-bottom: none; }
  .recent-time  { color: #bbb; font-size: 10px; width: 46px; flex-shrink: 0; }
  .recent-name  { font-weight: 700; flex: 1; color: var(--text-dark); }
  .recent-grade { color: var(--text-mid); font-size: 10px; margin-right: 5px; }
  .badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-gc { background: var(--공채-light); color: var(--공채); }
  .badge-gm { background: var(--공무원-light); color: var(--공무원); }

  /* 팝업 */
  .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.6); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .popup-overlay.show { display: flex; }
  .popup { background: #fff; border-radius: 32px; padding: 44px 36px 32px; width: 460px; max-width: 92%; text-align: center; animation: popUp 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 24px 80px rgba(0,0,0,0.22); }
  @keyframes popUp { from{opacity:0;transform:scale(0.6)translateY(40px);}to{opacity:1;transform:scale(1)translateY(0);} }
  .popup.success { border-top: 10px solid var(--success); }
  .popup.error   { border-top: 10px solid var(--error); }
  .popup.warn    { border-top: 10px solid var(--warn); }
  .popup-icon { font-size: 80px; line-height: 1; margin-bottom: 12px; }
  .popup-name { font-size: 38px; font-weight: 900; margin: 8px 0; }
  .popup.success .popup-name { color: var(--success); }
  .popup.error   .popup-name { color: var(--error); }
  .popup.warn    .popup-name { color: var(--warn); }
  .popup-sub { font-size: 17px; color: #666; line-height: 1.7; margin-bottom: 24px; white-space: pre-line; }
  .popup-close { width: 100%; padding: 16px; font-size: 17px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; border: none; border-radius: 14px; cursor: pointer; }
  .popup.success .popup-close { background: #e8f5e9; color: var(--success); }
  .popup.error   .popup-close { background: #ffebee; color: var(--error); }
  .popup.warn    .popup-close { background: #fff8e1; color: var(--warn); }

  .deco { position: fixed; font-size: 24px; opacity: 0.06; pointer-events: none; animation: float 7s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)rotate(-8deg);}50%{transform:translateY(-20px)rotate(8deg);} }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const API_URL     = 'https://script.google.com/macros/s/AKfycbygjz4zpTfDgK5PX6xM5rsVw9K6Ljwn62BmyCvoInZ5uVw9YNPWJ0WFFYKT7VSs3vMZuA/exec';
const MOBILE_BASE = 'https://sbyjune1-web.github.io/geupsik/jeobeupbu_mobile.html';
const SECRET_KEY  = 'gwangjuyeosang2024';

let currentClass = '공채반';
const recentItems = [];
let popupTimer = null;

// ── 오늘의 토큰 생성 (SHA-256) ──────────────────────────
async function generateToken(dateStr, cls) {
  const msg = dateStr + '|' + cls + '|' + SECRET_KEY;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0, 16);
}

function getTodayStr() {
  return new Date().toLocaleDateString('ko-KR', { timeZone:'Asia/Seoul' })
    .replace(/\. /g,'-').replace('.','').trim();
}

// ── QR 생성 ──────────────────────────────────────────────
async function updateQR(cls) {
  const today = getTodayStr();
  const token = await generateToken(today, cls);
  const url   = MOBILE_BASE + '?cls=' + encodeURIComponent(cls) + '&date=' + encodeURIComponent(today) + '&token=' + token + '&api=' + encodeURIComponent(API_URL);

  const el = document.getElementById('qrcode');
  el.innerHTML = '';
  new QRCode(el, {
    text: url, width: 160, height: 160,
    colorDark: cls === '공채반' ? '#1565C0' : '#6a1b9a',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('qrToken').textContent = '토큰: ' + token + ' · ' + today;
  const label = document.getElementById('qrClassLabel');
  label.textContent = (cls === '공채반' ? '💼 ' : '🏛️ ') + cls;
  label.className = 'qr-class-label ' + (cls === '공채반' ? 'gc' : 'gm');
}

// ── 음성 ─────────────────────────────────────────────────
let voices = [];
speechSynthesis.onvoiceschanged = () => { voices = speechSynthesis.getVoices(); };
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.95; u.pitch = 1.1;
  const v = voices.find(v => v.lang.startsWith('ko') && /female|woman|미|나|여|유나|지수/i.test(v.name)) || voices.find(v => v.lang.startsWith('ko'));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}

// ── 시계 ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour12: false });
  document.getElementById('dateStr').textContent = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
updateClock(); setInterval(updateClock, 1000);

// 자정에 QR 자동 갱신
function scheduleQRRefresh() {
  const now = new Date();
  const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
  setTimeout(() => { updateQR(currentClass); scheduleQRRefresh(); }, msToMidnight);
}
scheduleQRRefresh();

// ── 반 선택 ──────────────────────────────────────────────
function selectClass(cls) {
  currentClass = cls;
  document.querySelectorAll('.class-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.class-tab[data-cls="' + cls + '"]').classList.add('active');
  const btn = document.getElementById('submitBtn');
  const inp = document.getElementById('studentIdInput');
  btn.className = cls === '공무원반' ? 'gm' : '';
  inp.className = cls === '공무원반' ? 'gm' : '';
  updateQR(cls);
  document.getElementById('studentIdInput').focus();
}

// ── 출석 등록 ────────────────────────────────────────────
async function submitAttendance() {
  const input = document.getElementById('studentIdInput');
  const btn   = document.getElementById('submitBtn');
  const studentId = input.value.trim();
  if (!studentId) { showPopup('error','❌','학번 미입력','학번을 입력해주세요'); return; }

  btn.disabled = true; btn.textContent = '확인 중... ⏳'; btn.style.opacity = '0.6';
  input.disabled = true;

  try {
    const res  = await fetch(API_URL, { method:'POST', body: JSON.stringify({ studentId, className: currentClass, method:'학번입력' }) });
    const data = await res.json();
    if (data.success) {
      const s = data.student;
      const cls = String(s.classNum).replace('반','');
      showPopup('success','✅', s.name + ' 학생', s.grade + '학년 ' + cls + '반 ' + s.number + '번\n' + currentClass + ' 출석 완료 🎉');
      speak(s.name + ' 학생, ' + currentClass + ' 출석 확인되었습니다');
      addRecent(s, currentClass);
      updateCounter(currentClass);
    } else if (data.duplicate) {
      const s = data.student;
      const cls = String(s.classNum).replace('반','');
      showPopup('warn','⚠️', s.name + ' 학생', s.grade + '학년 ' + cls + '반 ' + s.number + '번\n이미 ' + currentClass + ' 출석이 등록되어 있습니다');
      speak('이미 출석이 등록되어 있습니다');
    } else {
      showPopup('error','❌','등록 실패', data.message || '학번을 다시 확인해주세요');
      speak('등록되지 않은 학번입니다');
    }
  } catch(e) {
    showPopup('error','🔌','연결 오류','잠시 후 다시 시도해주세요');
  } finally {
    btn.disabled = false; btn.textContent = '출석 확인 ✓'; btn.style.opacity = '1';
    input.disabled = false; input.value = ''; input.focus();
  }
}

function showPopup(type, icon, name, sub) {
  const popup = document.getElementById('popup');
  popup.className = 'popup ' + type;
  document.getElementById('pIcon').textContent = icon;
  document.getElementById('pName').textContent = name;
  document.getElementById('pSub').textContent  = sub;
  document.getElementById('popupOverlay').classList.add('show');
  if (popupTimer) clearTimeout(popupTimer);
  if (type === 'success') popupTimer = setTimeout(closePopup, 3000);
}
function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  document.getElementById('studentIdInput').focus();
}

function addRecent(s, cls) {
  const time = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12:false });
  recentItems.unshift({ name:s.name, grade:s.grade, classNum:String(s.classNum).replace('반',''), number:s.number, cls, time });
  if (recentItems.length > 20) recentItems.pop();
  const list = document.getElementById('recentList');
  list.innerHTML = recentItems.map(r =>
    '<div class="recent-item">' +
    '<span class="recent-time">' + r.time + '</span>' +
    '<span class="recent-name">' + r.name + '</span>' +
    '<span class="recent-grade">' + r.grade + '학년 ' + r.classNum + '반</span>' +
    '<span class="badge ' + (r.cls==='공채반'?'badge-gc':'badge-gm') + '">' + r.cls + '</span>' +
    '</div>'
  ).join('');
}

function updateCounter(cls) {
  const id = cls==='공채반' ? 'gcCount' : 'gmCount';
  const el = document.getElementById(id);
  el.textContent = (parseInt(el.textContent)||0) + 1;
}

async function loadStatus() {
  try {
    const [r1,r2] = await Promise.all([
      fetch(API_URL + '?action=status&className=공채반').then(r=>r.json()),
      fetch(API_URL + '?action=status&className=공무원반').then(r=>r.json())
    ]);
    if (r1.success) document.getElementById('gcCount').textContent = r1.count;
    if (r2.success) document.getElementById('gmCount').textContent = r2.count;
  } catch(e) {}
}

// 초기화
updateQR('공채반');
loadStatus();
setInterval(loadStatus, 60000);
</script>
