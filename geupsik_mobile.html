<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>급식 출석 체크 - 광주여자상업고등학교</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --pink-light: #fff0f5;
    --pink-mid:   #ffd6e7;
    --pink-main:  #ff85b3;
    --pink-deep:  #e8457a;
    --rose:       #c2185b;
    --text-dark:  #3d1a2e;
    --text-mid:   #7b3f5e;
    --white:      #ffffff;
    --breakfast:  #ff6b35;
    --dinner:     #5b6abf;
    --success:    #2d8653;
    --error:      #c0392b;
    --warn:       #d4820a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, #fff0f5 0%, #ffffff 50%, #fce4ec 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px 0;
  }

  /* 상단 헤더 */
  .header {
    width: 100%;
    background: linear-gradient(135deg, #fff0f5 0%, #fce4ec 100%);
    border-bottom: 2px solid var(--pink-mid);
    padding: 16px 20px 12px;
    text-align: center;
    box-shadow: 0 2px 16px rgba(232,69,122,0.10);
  }
  .logo-img {
    height: 52px;
    object-fit: contain;
    margin-bottom: 6px;
  }
  .header-clock {
    font-size: 22px;
    font-weight: 700;
    color: var(--rose);
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .header-date {
    font-size: 13px;
    color: var(--text-mid);
    margin-top: 2px;
  }

  /* 카드 */
  .card {
    background: rgba(255,255,255,0.92);
    border-radius: 28px;
    padding: 28px 22px 24px;
    width: calc(100% - 32px);
    max-width: 380px;
    margin-top: 20px;
    box-shadow: 0 8px 32px rgba(232,69,122,0.13), 0 2px 8px rgba(0,0,0,0.06);
    border: 1.5px solid var(--pink-mid);
    text-align: center;
  }

  .card-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--text-dark);
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text-mid);
    margin-bottom: 18px;
  }

  /* 식사 탭 */
  .meal-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .meal-tab {
    flex: 1;
    padding: 13px 8px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: 2.5px solid #e0c0cc;
    border-radius: 16px;
    background: #fff8fb;
    color: #c4a0b0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .meal-tab.active.breakfast {
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    border-color: var(--breakfast);
    color: var(--breakfast);
    box-shadow: 0 4px 12px rgba(255,107,53,0.2);
    transform: translateY(-2px);
  }
  .meal-tab.active.dinner {
    background: linear-gradient(135deg, #e8eaf6, #c5cae9);
    border-color: var(--dinner);
    color: var(--dinner);
    box-shadow: 0 4px 12px rgba(91,106,191,0.2);
    transform: translateY(-2px);
  }

  /* 현재 식사 배지 */
  .meal-badge {
    display: inline-block;
    padding: 6px 22px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .meal-badge.breakfast { background: #fff3e0; color: var(--breakfast); border: 1.5px solid var(--breakfast); }
  .meal-badge.dinner    { background: #e8eaf6; color: var(--dinner);    border: 1.5px solid var(--dinner); }
  .meal-badge.default   { background: var(--pink-mid); color: var(--rose); border: 1.5px solid var(--pink-main); }

  /* 입력 */
  input[type=number] {
    width: 100%;
    padding: 18px;
    font-size: 30px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: 2.5px solid var(--pink-mid);
    border-radius: 16px;
    text-align: center;
    letter-spacing: 6px;
    outline: none;
    margin-bottom: 12px;
    transition: border 0.2s, box-shadow 0.2s;
    background: #fff8fb;
    color: var(--text-dark);
    -moz-appearance: textfield;
    display: block;
    width: 100%;
  }
  input[type=number]:focus {
    border-color: var(--pink-deep);
    box-shadow: 0 0 0 3px rgba(232,69,122,0.15);
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  button.submit {
    display: block;
    width: 100%;
    padding: 17px;
    font-size: 19px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--pink-deep) 0%, var(--rose) 100%);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(194,24,91,0.25);
    letter-spacing: 1px;
  }
  button.submit:active { transform: scale(0.97); opacity: 0.9; }

  /* 팝업 오버레이 */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,26,46,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
    animation: fadeIn 0.2s ease;
  }
  .popup-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .popup {
    background: #fff;
    border-radius: 28px;
    padding: 36px 28px 28px;
    width: 88%;
    max-width: 360px;
    text-align: center;
    animation: popUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  @keyframes popUp {
    from { opacity:0; transform: scale(0.7) translateY(30px); }
    to   { opacity:1; transform: scale(1)   translateY(0); }
  }

  .popup.success { border-top: 8px solid var(--success); }
  .popup.error   { border-top: 8px solid var(--error); }
  .popup.warn    { border-top: 8px solid var(--warn); }

  .popup-icon  { font-size: 64px; margin-bottom: 10px; line-height: 1; }
  .popup-name  { font-size: 32px; font-weight: 900; margin: 8px 0 6px; }
  .popup.success .popup-name { color: var(--success); }
  .popup.error   .popup-name { color: var(--error); }
  .popup.warn    .popup-name { color: var(--warn); }
  .popup-sub   { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 20px; }

  .popup-close {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .popup.success .popup-close { background: #e8f5e9; color: var(--success); }
  .popup.error   .popup-close { background: #ffebee; color: var(--error); }
  .popup.warn    .popup-close { background: #fff8e1; color: var(--warn); }

  /* 하트 장식 */
  .deco {
    position: fixed;
    font-size: 18px;
    opacity: 0.13;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-10deg); }
    50%      { transform: translateY(-18px) rotate(10deg); }
  }
</style>
</head>

  <div class="header-clock" id="clock">--:--:--</div>
  <div class="header-date"  id="dateStr"></div>

<!-- 카드 -->
<div class="card">
  <div class="card-title">🍱 급식 출석 체크</div>
  <div class="card-desc">식사를 선택하고 학번을 입력해주세요</div>

  <div class="meal-tabs" id="mealTabs">
    <button class="meal-tab breakfast" id="tabBreakfast" onclick="selectMeal('조식')">🌅 조식</button>
    <button class="meal-tab dinner"    id="tabDinner"    onclick="selectMeal('석식')">🌙 석식</button>
  </div>

  <div class="meal-badge default" id="mealBadge">식사를 선택하세요</div>

  <div id="inputArea" style="display:block;width:100%;">
    <input type="number" id="sid" placeholder="학번 입력" inputmode="numeric"
           onkeydown="if(event.key==='Enter') doSubmit()">
    <button class="submit" onclick="doSubmit()">출석 체크 ✓</button>
  </div>
</div>

<!-- 팝업 -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup" id="popup">
    <div class="popup-icon" id="pIcon"></div>
    <div class="popup-name" id="pName"></div>
    <div class="popup-sub"  id="pSub"></div>
    <button class="popup-close" onclick="closePopup()">확인</button>
  </div>
</div>

<script>
const DEFAULT_API = 'https://script.google.com/macros/s/AKfycbwa0kjUAUKG4qAnu-3MA-L1vSZHXekgfXdEiYBfNE-c0loNi6eJ7Qf8ns_p1Cp7QGU_5A/exec';
const params = new URLSearchParams(window.location.search);
const apiUrl = params.get('api') || DEFAULT_API;
let currentMeal = params.get('meal') || null;
let popupTimer = null;

// 시계
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour12: false });
  document.getElementById('dateStr').textContent = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
updateClock();
setInterval(updateClock, 1000);

// QR 스캔으로 meal 전달된 경우
if (currentMeal) {
  document.getElementById('mealTabs').style.display = 'none';
  applyMeal(currentMeal);
} else {
  currentMeal = '조식';
  document.getElementById('tabBreakfast').classList.add('active');
  applyMeal('조식');
}

function selectMeal(meal) {
  currentMeal = meal;
  document.getElementById('tabBreakfast').classList.toggle('active', meal === '조식');
  document.getElementById('tabDinner').classList.toggle('active',    meal === '석식');
  applyMeal(meal);
  document.getElementById('sid').focus();
}

function applyMeal(meal) {
  const emoji = meal === '조식' ? '🌅' : '🌙';
  const badge = document.getElementById('mealBadge');
  badge.textContent = emoji + ' ' + meal + ' 출석';
  badge.className = 'meal-badge ' + (meal === '조식' ? 'breakfast' : 'dinner');
}

async function doSubmit() {
  const sid = document.getElementById('sid').value.trim();
  if (!sid) { showPopup('error','❌','학번 미입력','학번을 입력해주세요'); return; }

  try {
    const res  = await fetch(apiUrl, { method:'POST', body: JSON.stringify({ studentId: sid, meal: currentMeal, method: 'QR스캔' }) });
    const data = await res.json();
    if (data.success) {
      const s = data.student;
      showPopup('success','✅', s.name + ' 학생', s.grade + '학년 ' + s.classNum + '반 ' + s.number + '번\n' + currentMeal + ' 출석이 완료되었습니다 🎉');
      document.getElementById('sid').value = '';
    } else if (data.duplicate) {
      showPopup('warn','⚠️','이미 완료', currentMeal + ' 출석이 이미 등록되어 있습니다');
    } else {
      showPopup('error','❌','등록 실패', data.message || '학번을 다시 확인해주세요');
    }
  } catch(e) {
    showPopup('error','🔌','연결 오류','잠시 후 다시 시도해주세요');
  }
}

function showPopup(type, icon, name, sub) {
  const overlay = document.getElementById('popupOverlay');
  const popup   = document.getElementById('popup');
  popup.className = 'popup ' + type;
  document.getElementById('pIcon').textContent = icon;
  document.getElementById('pName').textContent = name;
  document.getElementById('pSub').textContent  = sub;
  overlay.classList.add('show');
  if (popupTimer) clearTimeout(popupTimer);
  if (type === 'success') popupTimer = setTimeout(closePopup, 3000);
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  document.getElementById('sid').focus();
}
</script>
</body>
</html>
