<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>급식 출석 체크</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  :root {
    --breakfast: #FF8C00;
    --dinner: #1565C0;
    --success: #2E7D32;
    --error: #C62828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f8f8f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    text-align: center;
  }
  .emoji { font-size: 56px; margin-bottom: 8px; }
  .meal-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .meal-badge.breakfast { background: #FFF3E0; color: var(--breakfast); }
  .meal-badge.dinner    { background: #E3F2FD; color: var(--dinner); }
  .title { font-size: 22px; font-weight: 900; color: #1a1a1a; margin-bottom: 6px; }
  .desc  { font-size: 14px; color: #888; margin-bottom: 24px; }
  input[type=number] {
    width: 100%;
    padding: 18px;
    font-size: 28px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: 3px solid #e0e0e0;
    border-radius: 14px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    margin-bottom: 16px;
    transition: border 0.2s;
    -moz-appearance: textfield;
  }
  input[type=number]:focus { border-color: #1565C0; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  button.submit {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    border-radius: 14px;
    background: #1a1a1a;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button.submit:active { transform: scale(0.98); background: #333; }

  /* 결과 */
  .result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 14px;
    display: none;
    animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop {
    from { opacity:0; transform: scale(0.8); }
    to   { opacity:1; transform: scale(1); }
  }
  .result.success { background: #E8F5E9; display: block; }
  .result.error   { background: #FFEBEE; display: block; }
  .result.warn    { background: #FFFDE7; display: block; }
  .result-icon { font-size: 40px; }
  .result-name { font-size: 28px; font-weight: 900; margin: 6px 0; }
  .result-name.success { color: var(--success); }
  .result-name.error   { color: var(--error); }
  .result-name.warn    { color: #F57F17; }
  .result-sub  { font-size: 14px; color: #666; }

  /* 다시하기 */
  .retry-btn {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border: 2px solid #e0e0e0;
    border-radius: 14px;
    background: transparent;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="emoji" id="mealEmoji">🍱</div>
  <div class="meal-badge" id="mealBadge">급식</div>
  <div class="title">급식 출석 체크</div>
  <div class="desc">학번을 입력해주세요</div>

  <div id="inputArea">
    <input type="number" id="sid" placeholder="예: 10101" inputmode="numeric" maxlength="5"
           autofocus onkeydown="if(event.key==='Enter') submit()">
    <button class="submit" onclick="submit()">출석 체크 ✓</button>
  </div>

  <div class="result" id="resultBox">
    <div class="result-icon" id="rIcon"></div>
    <div class="result-name" id="rName"></div>
    <div class="result-sub"  id="rSub"></div>
  </div>
  <button class="retry-btn" id="retryBtn" onclick="retry()">↩ 다시 입력</button>
</div>

<script>
const DEFAULT_API = 'https://script.google.com/macros/s/AKfycbwa0kjUAUKG4qAnu-3MA-L1vSZHXekgfXdEiYBfNE-c0loNi6eJ7Qf8ns_p1Cp7QGU_5A/exec';
const params = new URLSearchParams(window.location.search);
const meal   = params.get('meal') || '조식';
const apiUrl = params.get('api')  || localStorage.getItem('apiUrl') || DEFAULT_API;

// 식사 표시
document.getElementById('mealEmoji').textContent = meal === '조식' ? '🌅' : '🌙';
const badge = document.getElementById('mealBadge');
badge.textContent = meal + ' 출석';
badge.className = 'meal-badge ' + (meal === '조식' ? 'breakfast' : 'dinner');

async function submit() {
  const sid = document.getElementById('sid').value.trim();
  if (!sid) return;
  if (!apiUrl) {
    show('error', '⚙️', '설정 오류', '태블릿 관리자에게 문의하세요');
    return;
  }

  try {
    const res = await fetch(apiUrl, {
      method: 'POST',
      body: JSON.stringify({ studentId: sid, meal, method: 'QR스캔' })
    });
    const data = await res.json();

    if (data.success) {
      const s = data.student;
      show('success', '✅', `${s.name} 학생`, `${s.grade}학년 ${s.classNum}반 ${s.number}번\n${meal} 출석이 완료되었습니다`);
    } else if (data.duplicate) {
      show('warn', '⚠️', '이미 완료', `${meal} 출석이 이미 등록되어 있습니다`);
    } else {
      show('error', '❌', '등록 실패', data.message || '학번을 확인해주세요');
    }
  } catch(e) {
    show('error', '🔌', '연결 오류', '태블릿 관리자에게 문의하세요');
  }
}

function show(type, icon, name, sub) {
  document.getElementById('inputArea').style.display = 'none';
  const box = document.getElementById('resultBox');
  box.className = `result ${type}`;
  document.getElementById('rIcon').textContent = icon;
  document.getElementById('rName').textContent = name;
  document.getElementById('rName').className   = `result-name ${type}`;
  document.getElementById('rSub').textContent  = sub;
  document.getElementById('retryBtn').style.display = 'block';
}

function retry() {
  document.getElementById('inputArea').style.display = 'block';
  document.getElementById('resultBox').className     = 'result';
  document.getElementById('retryBtn').style.display  = 'none';
  document.getElementById('sid').value = '';
  document.getElementById('sid').focus();
}
</script>
</body>
</html>
